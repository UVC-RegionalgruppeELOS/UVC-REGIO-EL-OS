<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stammtisch – UVC Regionalgruppe Emsland–Osnabrück</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #222;
            background: #e5e5e5;
            line-height: 1.6;
        }

        header {
            background: rgba(0,0,0,0.75);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ccc;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #2e5c2e;
        }

        section {
            max-width: 900px;
            margin: 40px auto;
            padding: 25px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h1, h2 {
            color: #2e5c2e;
        }

.stammtisch-img {
    display: block;
    margin: 25px auto 35px auto;
    width: 180px;
    border-radius: 8px; /* oder was du möchtest */
}
