<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt – UVC Regionalgruppe Emsland–Osnabrück</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #222;
            background: #e5e5e5;
            line-height: 1.6;
        }

        header {
            background: rgba(0,0,0,0.75);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ccc;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #2e5c2e;
        }

        .hero {
            height: 40vh;
            background: url('PLATZHALTER-UNIMOG.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 10px black;
            border-bottom: 2px solid #ccc;
        }

        .hero h1 {
            font-size: 2.8rem;
            margin: 0;
            color: white;
            text-align: center;
        }

        section {
            max-width: 900px;
            margin: 40px auto;
            padding: 25px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h1, h2 {
            color: #2e5c2e;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }

        button {
            background: #2e5c2e;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #244a24;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #444;
            font-size: 0.9rem;
            border-top: 1px solid #ccc;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <a href="index.html">Start</a>
        <a href="programm.html">Programm</a>
        <a href="stammtisch.html">Stammtisch</a>
        <a href="ansprechpartner.html">Ansprechpartner</a>
        <a href="kontakt.html"><strong>Kontakt</strong></a>
    </nav>
</header>

<div class="hero">
    <h1>Kontakt</h1>
</div>

<section>
    <h2>Schreib uns eine Nachricht</h2>
    <p>
        Du hast Fragen, Anregungen oder möchtest mit uns in Kontakt treten?  
        Nutze einfach das folgende Formular – wir melden uns so schnell wie möglich.
    </p>

    <form action="https://formspree.io/f/mojylqqz" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Nachricht</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit">Nachricht senden</button>
    </form>
</section>

<footer>
    © 2026 UVC Regionalgruppe Emsland–Osnabrück
</footer>

</body>
</html>
